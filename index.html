    <!-- REACT APPLICATION LOGIC -->

        const { useState, useEffect } = React;

        // --- SVG ICON COMPONENT BANK (100% Independent) ---
        const Icons = {

            Lock: () => (
                <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
            ),
            Award: () => (
                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z"></path></svg>
            )

        // --- EXAM MOCK QUESTIONS DATA ---
        const MOCK_EXAM_QUESTIONS = [
            {
                id: 1,
                question: "Which of the following belongs to the chemical class of Beta-Lactamase inhibitors?",
                options: ["Amoxicillin", "Clavulanic Acid", "Erythromycin", "Neomycin"],
                correct: 1
            },
            {
                id: 2,
                question: "What is the primary anatomical site of drug metabolism in the human body?",
                options: ["Kidneys", "Lungs", "Liver", "Spleen"],
                correct: 2
            },
            {
                id: 3,
                question: "Which equation is used to calculate the rate of drug dissolution from tablets?",
                options: ["Henderson-Hasselbalch", "Noyes-Whitney", "Michaelis-Menten", "Arrhenius Equation"],
                correct: 1
            },
            {
                id: 4,
                question: "The term 'Pharmacodynamics' refers specifically to which pharmaceutical process?",
                options: ["What the body does to the drug", "What the drug does to the body", "The rate of drug elimination", "The chemical synthesis of active elements"],
                correct: 1
            }
        ];

        // --- SYSTEM STATE DATABASE ---
        const INITIAL_STATE = {
            stats: { testsTaken: 12, averageScore: '78%', rank: '1,142', jobsApplied: 2 },
            studyMaterials: [
                { id: 1, subject: 'Pharmacology', title: 'Beta-Lactam Antibiotics & Resistance Mechanics', type: 'video', duration: '45 mins', file: '#' },
                { id: 2, subject: 'Pharmaceutics', title: 'Rheology of Non-Newtonian Emulsion Systems', type: 'pdf', pages: '12 pages', file: '#' },
                { id: 3, subject: 'Pharmacognosy', title: 'Alkaloid Glycosides & Selective Extraction Methods', type: 'video', duration: '30 mins', file: '#' },
                { id: 4, subject: 'Clinical Pharmacy', title: 'Asthma Severity Classifications & Pathophysiology', type: 'pdf', pages: '8 pages', file: '#' },
                { id: 5, subject: 'Pharmaceutical Chemistry', title: 'Structure-Activity Relationship (SAR) of Sulfonamides', type: 'pdf', pages: '16 pages', file: '#' }
            ],
            tests: [
                { id: 1, title: 'GPAT National Mock Test Series - I', questions: 4, duration: '2 mins', category: 'Full Mock', status: 'Available' },
                { id: 2, title: 'Pharmacology Advanced Practice Test', questions: 25, duration: '30 mins', category: 'Subject', status: 'Available' },
                { id: 3, title: 'NIPER JEE Mock Concepts Challenge', questions: 100, duration: '120 mins', category: 'NIPER Specials', status: 'Locked' },
                { id: 4, title: 'Weekly Micro-Quiz: G-Protein Receptors', questions: 10, duration: '10 mins', category: 'Topic Quiz', status: 'Completed' },
            ],
            jobs: [
                { id: 1, role: 'State Drug Inspector Officer', company: 'Union Public Service Commission', location: 'New Delhi (All-India)', type: 'Government', req: 'B.Pharm with 18-months manufacturing experience' },
                { id: 2, role: 'Quality Assurance Associate Manager', company: 'Sun Pharmaceutical Industries', location: 'Vadodara, Gujarat', type: 'Corporate', req: 'M.Pharm in QA / Pharmaceutical Analytics' },
                { id: 3, role: 'Clinical Research Executive', company: 'Apollo Hospitals Group', location: 'Chennai, Tamil Nadu', type: 'Hospital', req: 'Pharm.D or M.Pharm in Pharmacy Practice' },
                { id: 4, role: 'Junior Research Fellow (JRF)', company: 'NIPER Mohali Project Labs', location: 'Mohali, Punjab', type: 'Research', req: 'M.Pharm / GPAT Qualified' },
            ],
            news: [
                { id: 1, title: 'NTA issues official guidelines and syllabus modifications for upcoming GPAT', date: '3 hours ago', tag: 'Exam Board' },
                { id: 2, title: 'Global Pharmaceutical Research: Novel GLP-1 peptide analogs enter phase-3 trials', date: '6 hours ago', tag: 'Industry' },
                { id: 3, title: 'Top strategy tips to crack NIPER pharmaceutical sciences entrance exam on first attempt', date: '1 day ago', tag: 'Academic' },
            ],
            discussions: [
                { id: 1, user: "Aniket Sharma", q: "What is the best reference book for physical pharmaceutics calculations?", replies: 12, time: "2 hours ago" },
                { id: 2, user: "Priya Patel", q: "Can anyone explain the difference in peak concentrations of IV vs Oral dosing?", replies: 8, time: "4 hours ago" }
            ]
        };

        // --- MAIN APP COMPONENT ---
        function App() {
            const [activeTab, setActiveTab] = useState('dashboard');
            const [state, setState] = useState(INITIAL_STATE);
            
            // Search / Filter States
            const [studySearch, setStudySearch] = useState('');
            const [jobSearch, setJobSearch] = useState('');
            const [jobFilter, setJobFilter] = useState('All');
            const [forumInput, setForumInput] = useState('');

            // Exam Sandbox States
            const [activeExam, setActiveExam] = useState(null); // stores index.html exam if running
            const [examStarted, setExamStarted] = useState(false);
            const [examQuestions, setExamQuestions] = useState([]);
            const [currentQIndex, setCurrentQIndex] = useState(0);
            const [selectedAnswers, setSelectedAnswers] = useState({});
            const [examTimer, setExamTimer] = useState(120); // 2 minutes
            const [examScore, setExamScore] = useState(null);

            // Job Application States
            const [selectedJob, setSelectedJob] = useState(null);
            const [applyForm, setApplyForm] = useState({ name: '', email: '', resumeName: '' });
            const [applySuccess, setApplySuccess] = useState(false);

            // Notification message state
            const [notification, setNotification] = useState(null);

            // Flash helper notification
            const showToast = (msg) => {
                setNotification(msg);
                setTimeout(() => setNotification(null), 4000);
            };

            // Test timer countdown logic
            useEffect(() => {
                let interval;
                if (examStarted && examTimer > 0) {
                    interval = setInterval(() => {
                        setExamTimer((prev) => prev - 1);
                    }, 1000);
                } else if (examTimer === 0 && examStarted) {
                    handleFinishExam();
                }
                return () => clearInterval(interval);
            }, [examStarted, examTimer]);

            // Handlers for Exam Engine
            const handleLaunchExam = (test) => {
                if (test.status === 'Locked') {
                    showToast("This mock exam requires a Premium Subscription. Upgrade coming soon!");
                    return;
                }
                if (test.status === 'Completed') {
                    showToast("You have already completed this diagnostic quiz.");
                    return;
                }
                setActiveExam(test);
                setExamQuestions(MOCK_EXAM_QUESTIONS);
                setCurrentQIndex(0);
                setSelectedAnswers({});
                setExamTimer(120); // reset 2 min
                setExamScore(null);
                setExamStarted(true);
            };

            const handleAnswerSelect = (optionIdx) => {
                setSelectedAnswers({
                    ...selectedAnswers,
                    [currentQIndex]: optionIdx
                });
            };

            const handleFinishExam = () => {
                setExamStarted(false);
                let correctCount = 0;
                examQuestions.forEach((q, idx) => {
                    if (selectedAnswers[idx] === q.correct) {
                        correctCount++;
                    }
                });
                const percentage = Math.round((correctCount / examQuestions.length) * 100);
                setExamScore({
                    total: examQuestions.length,
                    correct: correctCount,
                    percent: percentage
                });

                // Update general stats
                setState(prev => ({
                    ...prev,
                    stats: {
                        ...prev.stats,
                        testsTaken: prev.stats.testsTaken + 1,
                        averageScore: `${Math.round((parseInt(prev.stats.averageScore) + percentage) / 2)}%`
                    }
                }));
                showToast(`Mock Exam Completed! You scored ${percentage}%`);
            };

            // Handlers for Careers Engine
            const handleJobApplyClick = (job) => {
                setSelectedJob(job);
                setApplySuccess(false);
                setApplyForm({ name: '', email: '', resumeName: 'My_Pharmacy_CV.pdf' });
            };

            const handleApplyFormSubmit = (e) => {
                e.preventDefault();
                setApplySuccess(true);
                setState(prev => ({
                    ...prev,
                    stats: {
                        ...prev.stats,
                        jobsApplied: prev.stats.jobsApplied + 1
                    }
                }));
                showToast(`Applied successfully to ${selectedJob.company}!`);
                setTimeout(() => {
                    setSelectedJob(null);
                }, 2000);
            };

            // Handlers for Forums Community
            const handlePostForum = (e) => {
                e.preventDefault();
                if (!forumInput.trim()) return;
                const newPost = {
                    id: Date.now(),
                    user: "You (Platform Owner)",
                    q: forumInput,
                    replies: 0,
                    time: "Just now"
                };
                setState(prev => ({
                    ...prev,
                    discussions: [newPost, ...prev.discussions]
                }));
                setForumInput('');
                showToast("Doubt posted successfully to active pharmacy feed!");
            };

            return (
                <div className="flex min-h-screen bg-slate-50 text-slate-800">
                    
                    {/* TOAST SYSTEM */}
                    {notification && (
                        <div className="fixed bottom-6 right-6 z-50 bg-slate-900 text-white px-5 py-3 rounded-xl shadow-2xl flex items-center space-x-3 border border-slate-800 animate-bounce">
                            <span className="w-2 h-2 rounded-full bg-emerald-400 animate-ping"></span>
                            <span className="text-sm font-semibold">{notification}</span>
                        </div>
                    )}

                    {/* SIDEBAR NAVIGATION */}
                    <aside className="w-72 bg-white border-r border-slate-200 hidden lg:flex flex-col shrink-0">
                        <div className="h-20 px-8 flex items-center space-x-3 border-b border-slate-100">
                            <Icons.Logo />
                            <div>
                                <h1 className="text-xl font-extrabold tracking-tight text-slate-900">PharmaNexum</h1>
                                <span className="text-xs font-semibold text-emerald-600 bg-emerald-50 px-2 py-0.5 rounded-md">PROTRACTIVE PORTAL</span>
                            </div>
                        </div>

                        <div className="flex-1 px-4 py-6 space-y-2">
                            <button onClick={() => { setActiveTab('dashboard'); setActiveExam(null); }} className={`w-full flex items-center px-4 py-3.5 rounded-xl text-sm font-semibold transition-all ${activeTab === 'dashboard' ? 'bg-brand-600 text-white shadow-lg shadow-brand-100' : 'text-slate-600 hover:bg-slate-50'}`}>
                                <span className="mr-3"><Icons.Dashboard /></span>
                                Main Dashboard
                            </button>
                            
                            <button onClick={() => { setActiveTab('study'); setActiveExam(null); }} className={`w-full flex items-center px-4 py-3.5 rounded-xl text-sm font-semibold transition-all ${activeTab === 'study' ? 'bg-brand-600 text-white shadow-lg shadow-brand-100' : 'text-slate-600 hover:bg-slate-50'}`}>
                                <span className="mr-3"><Icons.Academic /></span>
                                Academic Engine
                            </button>

                            <button onClick={() => { setActiveTab('tests'); setActiveExam(null); }} className={`w-full flex items-center px-4 py-3.5 rounded-xl text-sm font-semibold transition-all ${activeTab === 'tests' ? 'bg-brand-600 text-white shadow-lg shadow-brand-100' : 'text-slate-600 hover:bg-slate-50'}`}>
                                <span className="mr-3"><Icons.Test /></span>
                                Examination Engine
                            </button>

                            <button onClick={() => { setActiveTab('jobs'); setActiveExam(null); }} className={`w-full flex items-center px-4 py-3.5 rounded-xl text-sm font-semibold transition-all ${activeTab === 'jobs' ? 'bg-brand-600 text-white shadow-lg shadow-brand-100' : 'text-slate-600 hover:bg-slate-50'}`}>
                                <span className="mr-3"><Icons.Career /></span>
                                Career Portal
                            </button>

                            <button onClick={() => { setActiveTab('news'); setActiveExam(null); }} className={`w-full flex items-center px-4 py-3.5 rounded-xl text-sm font-semibold transition-all ${activeTab === 'news' ? 'bg-brand-600 text-white shadow-lg shadow-brand-100' : 'text-slate-600 hover:bg-slate-50'}`}>
                                <span className="mr-3"><Icons.News /></span>
                                News & Discussions
                            </button>
                        </div>

                        <div className="p-6 border-t border-slate-100 bg-slate-50/50">
                            <div className="flex items-center space-x-3 mb-2">
                                <div className="w-10 h-10 rounded-xl bg-brand-100 text-brand-700 font-bold text-center flex items-center justify-center">
                                    PS
                                </div>
                                <div>
                                    <h4 className="text-sm font-bold text-slate-900">Bhaskar Raj</h4>
                                    <p className="text-xs font-semibold text-brand-600">Platform Owner (Admin)</p>
                                </div>
                            </div>
                            <div className="text-[11px] text-slate-400 font-medium">Domain Verified • Vercel Host</div>
                        </div>
                    </aside>

                    {/* MAIN SCREEN CANVAS */}
                    <div className="flex-1 flex flex-col min-w-0">
                        
                        {/* HEADER */}
                        <header className="h-20 bg-white border-b border-slate-200 flex items-center justify-between px-6 lg:px-10">
                            <div className="flex items-center space-x-3 lg:hidden">
                                <Icons.Logo />
                                <h1 className="text-lg font-bold text-slate-900">PharmaNexum</h1>
                            </div>
                            <div className="hidden lg:block">
                                <span className="text-sm font-medium text-slate-400">Current Workspace:</span>
                                <span className="text-sm font-bold text-slate-800 ml-1.5">GPAT & Allied Sciences Focus</span>
                            </div>

                            {/* MOBILE NAVIGATION TABS */}
                            <div className="flex lg:hidden space-x-1">
                                <button onClick={() => setActiveTab('dashboard')} className={`p-2 rounded-lg ${activeTab==='dashboard'?'bg-brand-100 text-brand-700':'text-slate-600'}`} title="Dashboard"><Icons.Dashboard /></button>
                                <button onClick={() => setActiveTab('study')} className={`p-2 rounded-lg ${activeTab==='study'?'bg-brand-100 text-brand-700':'text-slate-600'}`} title="Notes"><Icons.Academic /></button>
                                <button onClick={() => setActiveTab('tests')} className={`p-2 rounded-lg ${activeTab==='tests'?'bg-brand-100 text-brand-700':'text-slate-600'}`} title="Exams"><Icons.Test /></button>
                                <button onClick={() => setActiveTab('jobs')} className={`p-2 rounded-lg ${activeTab==='jobs'?'bg-brand-100 text-brand-700':'text-slate-600'}`} title="Jobs"><Icons.Career /></button>
                                <button onClick={() => setActiveTab('news')} className={`p-2 rounded-lg ${activeTab==='news'?'bg-brand-100 text-brand-700':'text-slate-600'}`} title="News"><Icons.News /></button>
                            </div>
                        </header>

                        {/* VIEW WORKSPACE */}
                        <div className="flex-1 p-6 lg:p-10 overflow-y-auto max-w-7xl w-full mx-auto">
                            
                            {/* IF AN EXAM INTERACTIVE PLAYGROUND IS LAUNCHED */}
                            {activeExam ? (
                                <div className="bg-white rounded-2xl border border-slate-200 p-6 lg:p-8 shadow-xl max-w-3xl mx-auto">
                                    {examStarted ? (
                                        <div>
                                            {/* Live Header */}
                                            <div className="flex items-center justify-between border-b border-slate-100 pb-4 mb-6">
                                                <div>
                                                    <span className="text-xs font-bold text-brand-600 bg-brand-50 px-3 py-1 rounded-full uppercase">MOCK PLAYGROUND</span>
                                                    <h3 className="text-lg font-bold text-slate-900 mt-1">{activeExam.title}</h3>
                                                </div>
                                                <div className="bg-rose-50 border border-rose-100 rounded-xl px-4 py-2 flex items-center space-x-2">
                                                    <span className="w-2.5 h-2.5 rounded-full bg-rose-500 animate-ping"></span>
                                                    <span className="text-sm font-extrabold text-rose-700">Time Left: {Math.floor(examTimer / 60)}:{(examTimer % 60).toString().padStart(2, '0')}</span>
                                                </div>
                                            </div>

                                            {/* Progress bar */}
                                            <div className="w-full h-2 bg-slate-100 rounded-full mb-6 overflow-hidden">
                                                <div className="h-full bg-brand-600 transition-all duration-300" style={{ width: `${((currentQIndex + 1) / examQuestions.length) * 100}%` }}></div>
                                            </div>

                                            {/* Question Presentation */}
                                            <div className="bg-slate-50 rounded-xl p-5 mb-6 border border-slate-100">
                                                <span className="text-xs font-bold text-slate-400">QUESTION {currentQIndex + 1} OF {examQuestions.length}</span>
                                                <h4 className="text-md font-bold text-slate-800 mt-2">{examQuestions[currentQIndex].question}</h4>
                                            </div>

                                            {/* Multi-choice items */}
                                            <div className="grid grid-cols-1 gap-3 mb-8">
                                                {examQuestions[currentQIndex].options.map((opt, oIdx) => (
                                                    <button
