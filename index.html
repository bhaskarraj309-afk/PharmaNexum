            stats: { testsTaken: 12, averageScore: '76%', rank: '2,401', jobsApplied: 3 },
            studyMaterials: [
                { 
                    id: 1, 
                    subject: 'Pharmacology', 
                    title: 'Beta-Lactam Antibiotics', 
                    type: 'video', 
                    duration: '45 mins', 
                    color: 'from-blue-400 to-blue-600',
                    content: {
                        introduction: "Beta-Lactams include Penicillins, Cephalosporins, Carbapenems, and Monobactams. They contain a highly strained 4-membered lactam ring essential for medicinal action.",
                        mechanism: "They inhibit Peptidoglycan cell wall synthesis by binding covalently to Penicillin-Binding Proteins (PBPs), causing enzymatic activation of autolysins and subsequent cell lysis.",
                        resistance: "Primary resistance mechanisms include the production of Beta-lactamases (enzymes that break down the ring) or modification of target PBPs (as seen in MRSA)."
                    }
                },
                { 
                    id: 2, 
                    subject: 'Pharmaceutics', 
                    title: 'Rheology Systems', 
                    type: 'pdf', 
                    pages: '12 pages', 
                    color: 'from-teal-400 to-teal-600',
                    content: {
                        introduction: "Rheology is the study of flow behavior of materials under stress. Crucial in formulation designs of suspensions, emulsions, and semisolid ointments.",
                        mechanism: "Newtonian systems exhibit constant viscosity regardless of shear rate. Non-Newtonian systems display Shear-Thinning (Pseudoplastic, e.g. Polymer mucilage), Shear-Thickening (Dilatant, e.g. starch paste), or Plastic behavior (Bingham plastic, e.g. toothpaste with yield value).",
                        resistance: "Thixotropy is a highly desirable formulation trait: an isothermal, reversible transformation from gel-to-sol on shaking, enabling easy dispensing from containers and precise dose delivery."
                    }
                },
                { 
                    id: 3, 
                    subject: 'Pharmacognosy', 
                    title: 'Alkaloids Extraction', 
                    type: 'video', 
                    duration: '30 mins', 
                    color: 'from-indigo-400 to-indigo-600',
                    content: {
                        introduction: "Alkaloids are basic nitrogenous compounds of plant origin, possessing profound physiological actions.",
                        mechanism: "Extraction involves treating powdered crude drug with mild bases (ammonium hydroxide) to liberate free alkaloidal bases, followed by solvent partition with chloroform/ether. Acidification yields water-soluble salts.",
                        resistance: "Key chemical tests: Mayer's reagent (creamy ppt), Dragendorff's reagent (reddish-brown ppt), Wagner's reagent (red-brown ppt), and Hager's reagent (yellow ppt)."
                    }
                },
            ],
            tests: [
                { id: 1, title: 'GPAT Full-Length Mock 1', questions: 5, duration: '5 mins', category: 'Full Mock', status: 'Available' },
                { id: 2, title: 'Pharmacology Subject-Wise', questions: 5, duration: '5 mins', category: 'Subject', status: 'Available' },
                { id: 3, title: 'NIPER JEE Advanced', questions: 100, duration: '120 mins', category: 'Full Mock', status: 'Locked' },
            ],
            jobs: [
                { id: 1, role: 'State Drug Inspector', company: 'Public Service Commission', location: 'Multiple Cities', type: 'Government', req: 'B.Pharm' },
                { id: 2, role: 'Quality Assurance Officer', company: 'Sun Pharma', location: 'Vadodara, Gujarat', type: 'Corporate', req: 'M.Pharm (QA)' },
                { id: 3, role: 'Clinical Pharmacist', company: 'Apollo Hospitals', location: 'New Delhi', type: 'Hospital', req: 'Pharm.D' },
            ],
            news: [
                { id: 1, title: 'NTA Announces GPAT 2027 Registration Dates', date: '2 hours ago', tag: 'Exam Alert' },

            const [activeTab, setActiveTab] = useState('dashboard');
            const [isSidebarOpen, setIsSidebarOpen] = useState(false);
            const [loadingTab, setLoadingTab] = useState(false);
            const [activeModal, setActiveModal] = useState(null);
            
            // Interactive Features States
            const [activeExam, setActiveExam] = useState(null); // When exam is active
            const [activeStudy, setActiveStudy] = useState(null); // When slide viewer is active
            const [activeApplyJob, setActiveApplyJob] = useState(null); // Job application overlay

            // Simulate smooth loading when switching tabs
            const handleTabChange = (tab) => {
                setLoadingTab(true);
                setActiveTab(tab);
                setIsSidebarOpen(false);
                setTimeout(() => setLoadingTab(false), 300);
            };

            const renderContent = () => {
                if (loadingTab) {
                    return (
                        <div className="flex flex-col items-center justify-center h-full min-h-[400px]">
                            <div className="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>

                        </div>
                    );
                }
                switch (activeTab) {
                    case 'dashboard': return <DashboardView onTabChange={handleTabChange} openStudy={setActiveStudy} />;

                    case 'tests': return <TestView openModal={setActiveModal} />;
                    case 'jobs': return <JobView openApply={setActiveApplyJob} />;

                                    <Icon name="Bell" size={20} />

                                <div className="h-8 w-px bg-slate-200 hidden md:block"></div>
                                <span className="text-sm font-semibold text-slate-600 hidden md:block">Active Prep State</span>

                                        <div className="bg-blue-50 border border-blue-100 p-4 rounded-xl mb-6">
                                            <p className="text-xs text-blue-700 font-semibold flex items-center">
                                                <Icon name="Activity" size={16} className="mr-2"/> Live monitoring and timer sequence will initiate immediately.
                                            </p>
                                        </div>
                                        <div className="flex gap-4">
                                            <button onClick={() => setActiveModal(null)} className="flex-1 py-3 bg-slate-100 text-slate-700 rounded-xl font-bold hover:bg-slate-200 transition">

                        {/* STUDY NOTES READER VIEW */}

                            <StudyReader module={activeStudy} onClose={() => setActiveStudy(null)} />

                        {/* CAREER RECRUITMENT APPLICATION MODAL */}
                        {activeApplyJob && (
                            <JobApplyModal job={activeApplyJob} onClose={() => setActiveApplyJob(null)} />

                    {/* Mobile Sidebar Overlay */}

                        <div className="relative z-10">
                            <h2 className="text-3xl font-extrabold mb-2">Ready to conquer GPAT & NIPER?</h2>

                        {/* Decorative elements */}

                    <div className="grid grid-cols-2 md:grid-cols-4 gap-4 md:gap-6">

        // 1. Examination Player Component
        function ExamPlayer({ test, onClose }) {
            const [currentQIndex, setCurrentQIndex] = useState(0);
            const [selectedAnswers, setSelectedAnswers] = useState({});
            const [examSubmitted, setExamSubmitted] = useState(false);
            const [timeLeft, setTimeLeft] = useState(300); // 5 minutes standard timer

            useEffect(() => {
                if (examSubmitted || timeLeft <= 0) return;
                const timer = setInterval(() => {
                    setTimeLeft(prev => prev - 1);
                }, 1000);
                return () => clearInterval(timer);
            }, [timeLeft, examSubmitted]);

            const handleAnswerSelect = (optionIdx) => {
                if (examSubmitted) return;
                setSelectedAnswers({
                    ...selectedAnswers,
                    [currentQIndex]: optionIdx
                });
            };

            const calculateResults = () => {
                let correctCount = 0;
                MOCK_QUESTIONS.forEach((q, idx) => {
                    if (selectedAnswers[idx] === q.correct) {
                        correctCount++;
                    }
                });
                return {
                    correct: correctCount,
                    total: MOCK_QUESTIONS.length,
                    percentage: Math.round((correctCount / MOCK_QUESTIONS.length) * 100)
                };
            };

            const progressPercentage = Math.round(((currentQIndex + 1) / MOCK_QUESTIONS.length) * 100);
            const formatTime = (seconds) => {
                const mins = Math.floor(seconds / 60);
                const secs = seconds % 60;
                return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
            };

            return (
                <div className="fixed inset-0 bg-slate-900 z-50 flex flex-col animate-fade-in text-slate-100">
                    {/* Exam Header */}
                    <div className="bg-slate-850 border-b border-slate-800 p-4 flex justify-between items-center px-6 md:px-12 shrink-0">
                        <div>
                            <span className="text-teal-400 text-xs font-bold uppercase tracking-wider">Evaluation Engine Active</span>
                            <h3 className="text-lg font-bold text-white">{test.title}</h3>
                        </div>
                        <div className="flex items-center gap-6">
                            <div className="bg-slate-800 border border-slate-700 px-4 py-2 rounded-xl flex items-center gap-2">
                                <Icon name="Clock" size={16} className="text-amber-400" />
                                <span className="font-mono font-bold text-amber-400">{examSubmitted ? "Exam Suspended" : formatTime(timeLeft)}</span>
                            </div>
                            <button onClick={onClose} className="p-2 bg-slate-800 hover:bg-slate-700 rounded-lg text-slate-400 hover:text-white">
                                <Icon name="X" size={20} />
                            </button>
                        </div>
                    </div>

                    {/* Progress Slider */}
                    <div className="w-full bg-slate-800 h-1">
                        <div className="bg-blue-500 h-1 transition-all duration-300" style={{width: `${progressPercentage}%`}}></div>
                    </div>

                    {/* Content Section */}
                    <div className="flex-1 overflow-y-auto p-6 md:p-12 flex items-center justify-center">
                        <div className="max-w-2xl w-full bg-slate-800/50 border border-slate-800 p-6 md:p-10 rounded-2xl shadow-xl">
                            {!examSubmitted ? (
                                <div className="space-y-6">
                                    <div className="flex justify-between items-center text-xs text-slate-400 font-bold uppercase tracking-wider">
                                        <span>Question {currentQIndex + 1} of {MOCK_QUESTIONS.length}</span>
                                        <span className="bg-blue-900/40 text-blue-400 border border-blue-900 px-2 py-0.5 rounded-md">High Yield Pharmacology</span>
                                    </div>
                                    <h4 className="text-xl font-bold leading-relaxed text-white">
                                        {MOCK_QUESTIONS[currentQIndex].q}
                                    </h4>
                                    <div className="space-y-3 pt-4">
                                        {MOCK_QUESTIONS[currentQIndex].options.map((opt, i) => {
                                            const isSelected = selectedAnswers[currentQIndex] === i;
                                            return (
                                                <button 
                                                    key={i} 
                                                    onClick={() => handleAnswerSelect(i)}
                                                    className={`w-full text-left p-4 rounded-xl border transition flex items-center justify-between ${
                                                        isSelected 
                                                            ? 'bg-blue-600 border-blue-500 text-white' 
                                                            : 'bg-slate-800 border-slate-700 text-slate-300 hover:bg-slate-700/50'
                                                    }`}
                                                >
                                                    <span className="font-medium text-sm md:text-base">{opt}</span>
                                                    <div className={`w-5 h-5 rounded-full border-2 flex items-center justify-center shrink-0 ${isSelected ? 'border-white bg-white' : 'border-slate-500'}`}>
                                                        {isSelected && <div className="w-2.5 h-2.5 rounded-full bg-blue-600"></div>}
                                                    </div>
                                                </button>
                                            );
                                        })}
                                    </div>
                                </div>
                            ) : (
                                <div className="text-center space-y-6 py-6">
                                    <div className="w-20 h-20 bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 rounded-full flex items-center justify-center mx-auto shadow-lg shadow-emerald-500/5 mb-4">
                                        <Icon name="Award" size={44} />
                                    </div>
                                    <h3 className="text-2xl font-black text-white">Mock Submission Complete</h3>
                                    <div className="grid grid-cols-3 gap-4 max-w-md mx-auto py-4">
                                        <div className="bg-slate-800 p-4 rounded-xl border border-slate-700">
                                            <p className="text-xs text-slate-400">Score</p>
                                            <p className="text-2xl font-bold text-emerald-400">{calculateResults().percentage}%</p>
                                        </div>
                                        <div className="bg-slate-800 p-4 rounded-xl border border-slate-700">
                                            <p className="text-xs text-slate-400">Correct</p>
                                            <p className="text-2xl font-bold text-white">{calculateResults().correct}/{calculateResults().total}</p>
                                        </div>
                                        <div className="bg-slate-800 p-4 rounded-xl border border-slate-700">
                                            <p className="text-xs text-slate-400">Time Taken</p>
                                            <p className="text-2xl font-bold text-blue-400">{formatTime(300 - timeLeft)}</p>
                                        </div>
                                    </div>

                                    {/* Question Analysis Review */}
                                    <div className="text-left space-y-4 pt-6 max-h-60 overflow-y-auto pr-2 scrollbar-hide">
                                        <h4 className="font-bold text-slate-300">Detailed Explanatory Diagnostics</h4>
                                        {MOCK_QUESTIONS.map((q, idx) => {
                                            const wasCorrect = selectedAnswers[idx] === q.correct;
                                            return (
                                                <div key={idx} className="bg-slate-800 p-4 rounded-xl border border-slate-700 text-xs">
                                                    <p className="font-bold text-slate-200 mb-1">Q{idx+1}: {q.q}</p>
                                                    <p className={`font-semibold ${wasCorrect ? 'text-emerald-400' : 'text-red-400'}`}>
                                                        {wasCorrect ? "✓ Correct Answer Selected" : `✗ Incorrect (Selected: ${q.options[selectedAnswers[idx]] || 'None'})`}
                                                    </p>
                                                    <p className="text-slate-400 mt-2 font-medium bg-slate-900/50 p-2 rounded leading-relaxed">{q.exp}</p>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>

                    {/* Navigation Footer */}
                    <div className="bg-slate-850 border-t border-slate-800 p-4 flex justify-between items-center px-6 md:px-12 shrink-0">
                        {!examSubmitted ? (
                            <React.Fragment>
                                <button 
                                    onClick={() => setCurrentQIndex(prev => Math.max(0, prev - 1))}
                                    disabled={currentQIndex === 0}
                                    className="px-6 py-2.5 bg-slate-800 text-slate-300 font-bold rounded-xl hover:bg-slate-700 transition disabled:opacity-40 disabled:cursor-not-allowed"
                                >
                                    Previous
                                </button>
                                {currentQIndex < MOCK_QUESTIONS.length - 1 ? (
                                    <button 
                                        onClick={() => setCurrentQIndex(prev => prev + 1)}
                                        className="px-6 py-2.5 bg-blue-600 text-white font-bold rounded-xl hover:bg-blue-700 transition"
                                    >
                                        Next Question
                                    </button>
                                ) : (
                                    <button 
                                        onClick={() => setExamSubmitted(true)}
                                        className="px-8 py-2.5 bg-emerald-600 text-white font-bold rounded-xl hover:bg-emerald-500 transition shadow-lg shadow-emerald-500/20 animate-pulse"
                                    >
                                        Submit Exam
                                    </button>
                                )}
                            </React.Fragment>
                        ) : (
                            <button 
                                onClick={onClose}
                                className="w-full py-3 bg-blue-600 text-white font-bold rounded-xl hover:bg-blue-700 transition text-center"
                            >
                                Finish Review & Exit
                            </button>
                        )}
                    </div>
                </div>
            );
        }

        // 2. Study Reader Sub-Component
        function StudyReader({ module, onClose }) {
            return (
                <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4 animate-fade-in">
                    <div className="bg-white rounded-3xl shadow-2xl w-full max-w-2xl overflow-hidden flex flex-col max-h-[90vh]">
                        <div className="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                            <div>
                                <span className="text-xs font-bold text-blue-600 uppercase tracking-widest">{module.subject} Revision Deck</span>
                                <h3 className="text-xl font-bold text-slate-800">{module.title}</h3>
                            </div>
                            <button onClick={onClose} className="text-slate-400 hover:text-slate-700 p-1.5 rounded-lg hover:bg-slate-100">
                                <Icon name="X" size={24} />
                            </button>
                        </div>
                        <div className="p-6 md:p-8 overflow-y-auto space-y-6">
                            <div className="space-y-2">
                                <h4 className="text-xs font-extrabold uppercase tracking-widest text-slate-400">01. Conceptual Overview</h4>
                                <p className="text-slate-600 text-sm leading-relaxed bg-slate-50 p-4 rounded-xl border border-slate-100">{module.content.introduction}</p>
                            </div>
                            <div className="space-y-2">
                                <h4 className="text-xs font-extrabold uppercase tracking-widest text-slate-400">02. Mechanism & Chemical Target Metrics</h4>
                                <p className="text-slate-600 text-sm leading-relaxed bg-slate-50 p-4 rounded-xl border border-slate-100">{module.content.mechanism}</p>
                            </div>
                            <div className="space-y-2">
                                <h4 className="text-xs font-extrabold uppercase tracking-widest text-slate-400">03. High-Yield Identification & Tests</h4>
                                <p className="text-slate-600 text-sm leading-relaxed bg-slate-50 p-4 rounded-xl border border-slate-100">{module.content.resistance}</p>
                            </div>
                        </div>
                        <div className="p-6 bg-slate-50 border-t border-slate-100 flex justify-between items-center">
                            <span className="text-xs font-bold text-slate-400">Total study index: Verified GPAT Syllabus 2027</span>
                            <button onClick={onClose} className="px-6 py-2 bg-blue-600 text-white text-sm font-bold rounded-xl hover:bg-blue-700 transition">
                                Complete Module
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        // 3. Job Apply Modal Sub-Component
        function JobApplyModal({ job, onClose }) {
            const [submitted, setSubmitted] = useState(false);
            const [candDegree, setCandDegree] = useState('B.Pharm');

            const handleFormSubmit = (e) => {
                e.preventDefault();
                setSubmitted(true);
            };

            const qualificationMatches = candDegree === job.req || (candDegree === 'M.Pharm (QA)' && job.req === 'B.Pharm') || job.req === 'B.Pharm';

            return (
                <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4 animate-fade-in">
                    <div className="bg-white rounded-3xl shadow-2xl w-full max-w-md overflow-hidden flex flex-col">
                        <div className="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                            <div>
                                <span className="text-xs font-bold text-blue-600 uppercase tracking-widest">Verify & Apply</span>
                                <h3 className="text-lg font-bold text-slate-800">{job.role}</h3>
                            </div>
                            <button onClick={onClose} className="text-slate-400 hover:text-slate-700 p-1.5 rounded-lg">
                                <Icon name="X" size={24} />
                            </button>
                        </div>
                        
                        {!submitted ? (
                            <form onSubmit={handleFormSubmit} className="p-6 space-y-4">
                                <div className="space-y-1">
                                    <label className="text-xs font-bold text-slate-500 uppercase">Verification Profile Profile Degree</label>
                                    <select 
                                        value={candDegree}
                                        onChange={(e) => setCandDegree(e.target.value)}
                                        className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-medium focus:outline-none focus:ring-2 focus:ring-blue-500"
                                    >
                                        <option value="B.Pharm">Bachelor of Pharmacy (B.Pharm)</option>
                                        <option value="M.Pharm (QA)">Master of Pharmacy (M.Pharm QA)</option>
                                        <option value="Pharm.D">Doctor of Pharmacy (Pharm.D)</option>
                                    </select>
                                </div>

                                <div className="bg-slate-50 p-4 rounded-xl border border-slate-100 text-xs text-slate-500 space-y-2">
                                    <div className="flex justify-between font-semibold">
                                        <span>Job Prerequisite:</span>
                                        <span className="text-slate-800">{job.req}</span>
                                    </div>
                                    <div className="flex justify-between font-semibold">
                                        <span>Candidate Qualification:</span>
                                        <span className="text-slate-800">{candDegree}</span>
                                    </div>
                                    <div className="pt-2 border-t border-slate-200 flex items-center justify-between">
                                        <span>System Eligibility Check:</span>
                                        {qualificationMatches ? (
                                            <span className="text-emerald-600 font-bold uppercase">Pass ✓</span>
                                        ) : (
                                            <span className="text-amber-600 font-bold uppercase">Manual Review Needed ⚠</span>
                                        )}
                                    </div>
                                </div>

                                <div className="space-y-1">
                                    <label className="text-xs font-bold text-slate-500 uppercase">Contact/Phone Number</label>
                                    <input required type="tel" placeholder="+91 98765 43210" className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-medium focus:outline-none focus:ring-2 focus:ring-blue-500" />
                                </div>

                                <div className="space-y-1">
                                    <label className="text-xs font-bold text-slate-500 uppercase">Resume Link / Profile URL</label>
                                    <input required type="url" placeholder="https://linkedin.com/in/yourname" className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-medium focus:outline-none focus:ring-2 focus:ring-blue-500" />
                                </div>

                                <button type="submit" className="w-full py-3 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700 transition shadow-lg shadow-blue-200 mt-4">
                                    Submit Profile Application
                                </button>
                            </form>
                        ) : (
                            <div className="p-8 text-center space-y-4">
                                <div className="w-16 h-16 bg-emerald-50 text-emerald-600 border border-emerald-100 rounded-full flex items-center justify-center mx-auto">
                                    <Icon name="Activity" size={32} />
                                </div>
                                <h3 className="text-xl font-bold text-slate-800">Application Submitted!</h3>
                                <p className="text-sm text-slate-500 leading-relaxed">
                                    Your candidacy validation report has been generated. The recruitment officer at <strong className="text-slate-700">{job.company}</strong> has received your contact sheet and matching degree certifications.
                                </p>
                                <button onClick={onClose} className="w-full py-2.5 bg-slate-100 text-slate-700 font-bold rounded-xl hover:bg-slate-200 transition">
                                    Return to Job Portal
                                </button>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // --- GENERAL UI COMPONENT WRAPPERS ---

        function NavItem({ icon, label, isActive, onClick }) {
            return (
                <button 
                    onClick={onClick}
                    className={`w-full flex items-center px-4 py-3 rounded-xl transition-all duration-200 text-sm font-bold ${
                        isActive 
                            ? 'bg-blue-600 text-white shadow-md shadow-blue-200' 
                            : 'text-slate-600 hover:bg-blue-50 hover:text-blue-700'
                    }`}
                >
                    <span className={`mr-3 ${isActive ? 'text-white' : 'text-slate-400'}`}>
                        {icon}
                    </span>
                    {label}
                </button>
            );
        }

        function StatCard({ title, value, icon, trend }) {
            return (
                <div className="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm hover:shadow-lg transition duration-300">
                    <div className="flex justify-between items-start mb-4">
                        <div className="p-2.5 bg-slate-50 rounded-xl border border-slate-100">{icon}</div>
                        <span className="text-[10px] font-bold text-emerald-600 bg-emerald-50 px-2 py-1 rounded-md">{trend}</span>
                    </div>
                    <div>
                        <h3 className="text-2xl font-extrabold text-slate-800">{value}</h3>
                        <p className="text-sm font-semibold text-slate-500 mt-1">{title}</p>
                    </div>
                </div>
            );
        }

        // --- FINAL RENDERING MOUNT ---
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
